# Default global configuration for git-cliff.
# Picked up when a repo has no cliff.toml of its own.
# Per-project configs (cliff.toml at repo root, or
# [package.metadata.git-cliff] in Cargo.toml / pyproject.toml /
# package.json) still override this file.

[changelog]
header = """
# Changelog

All notable changes to this project are documented here.
The format is based on [Keep a Changelog](https://keepachangelog.com/en/1.1.0/),
and this project follows [Conventional Commits](https://www.conventionalcommits.org/).

"""
body = """
{% if version -%}
## [{{ version | trim_start_matches(pat="v") }}] - {{ timestamp | date(format="%Y-%m-%d") }}
{% else -%}
## [Unreleased]
{% endif -%}
{% for group, commits in commits | group_by(attribute="group") %}
### {{ group | striptags | trim | upper_first }}
{% for commit in commits -%}
- {% if commit.breaking %}[**breaking**] {% endif %}\
{% if commit.scope %}**{{ commit.scope }}:** {% endif %}\
{{ commit.message | upper_first }}\
{% if commit.id %} ({{ commit.id | truncate(length=7, end="") }}){% endif %}
{% endfor %}
{% endfor %}
"""
footer = """
<!-- generated by git-cliff -->
"""
trim = true
postprocessors = []

[git]
conventional_commits = true
filter_unconventional = true
split_commits = false
protect_breaking_commits = true
filter_commits = true
tag_pattern = "v[0-9]*"
topo_order = false
sort_commits = "newest"

commit_preprocessors = []

commit_parsers = [
  # Hidden HTML-comment prefix forces section order while keeping the
  # rendered group name clean (git-cliff strips tags via `striptags`).
  { message = "^feat",     group = "<!-- 0 --> Features"      },
  { message = "^fix",      group = "<!-- 1 --> Bug Fixes"     },
  { message = "^perf",     group = "<!-- 2 --> Performance"   },
  { message = "^refactor", group = "<!-- 3 --> Refactor"      },
  { message = "^docs?",    group = "<!-- 4 --> Documentation" },
  { message = "^test",     group = "<!-- 5 --> Tests"         },
  { message = "^build",    group = "<!-- 6 --> Build System"  },
  { message = "^ci",       group = "<!-- 7 --> CI"            },
  { message = "^chore\\(release\\):", skip = true             },
  { message = "^chore\\(deps\\):",    group = "<!-- 8 --> Dependencies" },
  { message = "^chore",    group = "<!-- 9 --> Maintenance"   },
  { message = "^revert",   group = "<!-- 10 --> Reverts"      },
  { message = "^style",    group = "<!-- 11 --> Style"        },
  # Skip noise: WIP, merge commits, GPG-style trailers only.
  { message = "^WIP",      skip = true                        },
  { message = "^Merge",    skip = true                        },
]
